# Reference: Template structure inspired by unocss/unocss
name: 🚀 Feature request
description: Suggest a new feature for Actis
labels: ['enhancement: pending triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving Actis! We appreciate you taking time to share your idea.
  - type: textarea
    id: feature-description
    attributes:
      label: What problem are you facing?
      description: Describe the issue clearly. As a developer using Actis, I want [goal] so that [benefit]. If you plan to work on this yourself, mention it in the description.
    validations:
      required: true
  - type: textarea
    id: suggested-solution
    attributes:
      label: Proposed solution
      description: What would you like to see implemented? Share your ideas on how this could work.
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: Other approaches considered
      description: Have you thought of any alternatives or workarounds?
  - type: textarea
    id: additional-context
    attributes:
      label: Extra context
      description: Add any other relevant information, examples, or screenshots here.
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Before submitting
      description: Please ensure you've done the following
      options:
        - label: I've read the [Contributing Guidelines](https://github.com/SOHNE/Actis/blob/main/.github/CONTRIBUTING.md).
          required: true
        - label: I've read the `README.md` for this package.
          required: true
        - label: I've checked the [Documentation](https://actisgl.netlify.app/).
          required: false
        - label: I've searched for [existing feature requests](https://github.com/SOHNE/Actis/issues) to avoid duplicates.
          required: true
